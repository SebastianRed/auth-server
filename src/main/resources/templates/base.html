<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="~{::title}">Auth Server</title>

    <!-- Tailwind CSS CDN (en producción usar build estático) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Sora (display) + DM Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Tailwind config + CSS variables globales -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Sora', 'sans-serif'],
                        mono: ['DM Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50:  '#f0f0ff',
                            100: '#e2e2ff',
                            200: '#c8c8ff',
                            400: '#8b8bff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            900: '#1e1b4b',
                        },
                        surface: {
                            50:  '#f8f8fc',
                            100: '#f0f0f8',
                            800: '#1a1a2e',
                            850: '#16162a',
                            900: '#0f0f1e',
                            950: '#09090f',
                        }
                    },
                    animation: {
                        'fade-up':    'fadeUp 0.5s ease both',
                        'fade-in':    'fadeIn 0.4s ease both',
                        'slide-in':   'slideIn 0.4s ease both',
                        'pulse-soft': 'pulseSoft 2s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeUp:    { '0%': { opacity: '0', transform: 'translateY(16px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        fadeIn:    { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideIn:   { '0%': { opacity: '0', transform: 'translateX(-12px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } },
                        pulseSoft: { '0%, 100%': { opacity: '1' }, '50%': { opacity: '0.6' } },
                    }
                }
            }
        }
    </script>

    <style>
        /* Variables CSS globales */
        :root {
            --glass-bg:     rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --grid-color:   rgba(99, 102, 241, 0.06);
        }

        /* Grid de fondo decorativo */
        .bg-grid {
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        /* Card de glass */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Input base */
        .auth-input {
            @apply w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3
                   text-white placeholder-white/30 text-sm
                   focus:outline-none focus:border-brand-500/60 focus:bg-white/8
                   transition-all duration-200;
        }

        /* Botón primario */
        .btn-primary {
            @apply w-full py-3 px-6 rounded-xl font-semibold text-sm text-white
                   bg-gradient-to-r from-brand-600 to-brand-500
                   hover:from-brand-500 hover:to-brand-400
                   focus:outline-none focus:ring-2 focus:ring-brand-500/50
                   active:scale-[0.98] transition-all duration-200
                   disabled:opacity-50 disabled:cursor-not-allowed;
        }

        /* Botón secundario / ghost */
        .btn-ghost {
            @apply w-full py-3 px-6 rounded-xl font-medium text-sm text-white/70
                   border border-white/10 hover:border-white/25 hover:text-white
                   focus:outline-none focus:ring-2 focus:ring-white/20
                   transition-all duration-200;
        }

        /* Label */
        .auth-label {
            @apply block text-xs font-medium text-white/50 uppercase tracking-wider mb-2;
        }

        /* Stagger delays para animación de entrada */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }
    </style>

    <!-- Estilos adicionales por página -->
    <th:block th:replace="~{::head-extra}"></th:block>
</head>
<body class="min-h-screen font-sans antialiased bg-surface-950 text-white">

    <!-- Fondo con orbes de luz -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
        <div class="absolute -top-40 -left-40 w-96 h-96 bg-brand-700/20 rounded-full blur-3xl"></div>
        <div class="absolute top-1/2 -right-40 w-80 h-80 bg-brand-900/30 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-20 left-1/3 w-72 h-72 bg-indigo-900/20 rounded-full blur-3xl"></div>
        <div class="absolute inset-0 bg-grid opacity-100"></div>
    </div>

    <!-- Contenido de la página -->
    <div th:replace="~{::body-content}"></div>

    <!-- Scripts adicionales por página -->
    <th:block th:replace="~{::scripts}"></th:block>

</body>
</html>
